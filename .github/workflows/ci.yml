name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # sentence-transformers pulls in torch (~2 GB) and the RAG embedder
        # has a documented deterministic hashing fallback, so CI skips it.
        run: |
          grep -v '^sentence-transformers' requirements.txt > /tmp/requirements-ci.txt
          pip install -r /tmp/requirements-ci.txt -r requirements-data.txt

      - name: Run tests
        env:
          RAG_FORCE_HASH_EMBEDDINGS: "1"
        run: pytest -q

  frontend:
    name: Frontend typecheck, lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
